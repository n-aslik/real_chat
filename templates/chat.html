<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        #messages-container::-webkit-scrollbar { width: 6px; }
        #messages-container::-webkit-scrollbar-thumb { background: #ddd; }
    </style>
</head>

<body class="h-screen flex bg-slate-50 overflow-hidden font-sans">

<aside id="chat-sidebar" class="w-full md:w-80 border-r flex flex-col bg-white h-full shrink-0 transition-all duration-200 z-20 fixed md:static inset-y-0 left-0 transform translate-x-0 md:translate-x-0">

    <div class="p-4 bg-indigo-600 text-white flex justify-between items-center shadow-sm shrink-0">
        <div id="my-name" class="font-medium truncate max-w-[180px]">...</div>
        <button onclick="logout()" class="text-sm bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded-lg transition-colors">Баромадан</button>
    </div>

    <div id="users-list" class="hidden border-t overflow-y-auto h-40 bg-slate-50"></div>

    <div id="chats-list" class="flex-1 overflow-y-auto divide-y divide-slate-100">
        </div>
    
    <div id="delete-chat-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-5 md:p-6 rounded-2xl shadow-xl max-w-sm w-full transition-all transform scale-100">
            <h3 class="text-lg font-bold text-gray-900 mb-2">Удаление чата</h3>
            <p class="text-sm text-gray-500 mb-4">Вы уверены, что хотите удалить этот чат?</p>
            
            <div class="space-y-3 mb-6 bg-slate-50 p-3 rounded-xl">
                <label class="flex items-center space-x-3 cursor-pointer select-none">
                    <input type="checkbox" id="delete-all-checkbox" class="w-4 h-4 text-red-600 border-gray-300 rounded focus:ring-red-500 accent-red-600">
                    <span class="text-sm text-red-600 font-semibold">Удалить ДЛЯ ВСЕХ участников</span>
                </label>
                <p class="text-[11px] text-gray-400 leading-tight">Если галочка не установлена, чат удалится только для вас.</p>
            </div>
    
            <div class="flex justify-end space-x-3">
                <button id="cancel-delete-btn" class="px-4 py-2.5 text-sm font-medium bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl transition">Отмена</button>
                <button id="confirm-delete-btn" class="px-4 py-2.5 text-sm font-medium bg-red-600 hover:bg-red-700 text-white rounded-xl transition">Удалить</button>
            </div>
        </div>
    </div>

    <div class="p-3 border-t bg-white flex items-center gap-2 shrink-0">
        <button onclick="toggleUsers()"
                class="w-12 h-12 flex items-center justify-center bg-indigo-500 text-white rounded-xl shadow-md hover:bg-indigo-600 transition-all active:scale-95 text-xl shrink-0" 
                title="Пользователи">
            ➕ 
        </button>

        <button onclick="openGroupModal()"
                class="flex-1 bg-green-500 text-white h-12 rounded-xl font-medium shadow-md hover:bg-green-600 transition-all active:scale-95 flex items-center justify-center gap-2">
            📢 <span>Эълон</span>
        </button>
    </div>

</aside>


<main id="chat-main" class="w-full h-full flex flex-col bg-white fixed md:static inset-y-0 right-0 z-10 transform translate-x-full md:translate-x-0 transition-transform duration-200">

    <div class="flex items-center justify-between px-4 py-3 border-b bg-white shrink-0 min-h-[65px]">
        <div class="flex items-center gap-3 min-w-0">
            <button onclick="hideChatWindow()" class="md:hidden p-2 -ml-2 text-indigo-600 hover:bg-slate-100 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                </svg>
            </button>
            <div class="font-bold text-gray-800 truncate" id="current-chat-name">
                Суҳбатро интихоб кун
            </div>
            <button id="participants-btn" onclick="openReturnParticipantsModal()" class="hidden ml-3 bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1 rounded-xl text-xs font-medium transition-colors flex items-center gap-1">
                👥 <span>Участники</span>
            </button>
        </div>
    </div>

    <div id="messages-container" class="flex-1 overflow-y-auto p-4 bg-slate-50/60 space-y-3"></div>

    <div class="p-3 border-t bg-white flex items-center gap-2 shrink-0 pb-safe">

        <input type="file" id="fileInput" class="hidden" onchange="uploadFile(event)">

        <button onclick="triggerFileInput()" class="p-2.5 text-gray-500 hover:text-indigo-600 hover:bg-slate-100 rounded-xl transition-colors text-xl shrink-0">
            🔗
        </button>

        <input id="messageInput"
               class="flex-1 border border-slate-200 bg-slate-50 p-2.5 rounded-xl outline-none focus:border-indigo-500 focus:bg-white transition-all text-sm md:text-base"
               placeholder="Сообщение"
               autocomplete="off">

        <button onclick="sendMessage(event)"
                class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white w-11 h-11 md:px-5 md:w-auto rounded-xl flex items-center justify-center transition-all shrink-0 font-medium">
            <span class="hidden md:inline">Отправить</span>
            <span class="md:hidden text-lg">➤</span>
        </button>

    </div>

</main>


<div id="groupModal"
     class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">

    <div class="bg-white p-5 md:p-6 rounded-2xl w-full max-w-md space-y-4 shadow-xl transition-all">

        <h2 class="font-bold text-lg text-gray-900">Создать группу</h2>

        <div id="group-users"
             class="max-h-52 overflow-y-auto border border-slate-100 rounded-xl p-2 bg-slate-50 space-y-1"></div>

        <div class="flex gap-3 pt-2">
            <button onclick="closeGroupModal()"
                    class="border border-slate-200 flex-1 py-2.5 rounded-xl font-medium text-gray-700 hover:bg-slate-50 transition-colors">
                Отмена
            </button>
            <button onclick="submitCreateGroup()"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white flex-1 py-2.5 rounded-xl font-medium shadow-md transition-colors">
                Создать
            </button>
        </div>

    </div>
</div>

<div id="returnParticipantsModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
    <div class="bg-white p-5 md:p-6 rounded-2xl w-full max-w-md space-y-4 shadow-xl transition-all">
        <h2 class="font-bold text-lg text-gray-900">Управление участниками чата</h2>
        
        <p class="text-xs text-gray-500">Выберите пользователей для добавления или возврата в текущий чат:</p>
        
        <div id="return-users-list" class="max-h-52 overflow-y-auto border border-slate-100 rounded-xl p-2 bg-slate-50 space-y-1">
            </div>

        <div class="flex gap-3 pt-2">
            <button onclick="closeReturnParticipantsModal()" class="border border-slate-200 flex-1 py-2.5 rounded-xl font-medium text-gray-700 hover:bg-slate-50 transition-colors">
                Отмена
            </button>
            <button onclick="submitReturnParticipants()" class="bg-indigo-600 hover:bg-indigo-700 text-white flex-1 py-2.5 rounded-xl font-medium shadow-md transition-colors">
                Применить
            </button>
        </div>
    </div>
</div>

<script src="/static/index.js"></script>

<script>
/**
 * UI HELPERS
 */
function toggleUsers() {
    const el = document.getElementById('users-list');
    el.classList.toggle('hidden');
}

function openGroupModal() {
    document.getElementById('groupModal').classList.remove('hidden');
    createGroupUI(); 
}

function closeGroupModal() {
    document.getElementById('groupModal').classList.add('hidden');
}

/**
 * Адаптивное управление экранами мобильных устройств.
 * Интегрируй вызов `showChatWindow()` в твой `index.js`, когда пользователь переключает или открывает чат.
 */
function showChatWindow() {
    const sidebar = document.getElementById('chat-sidebar');
    const mainChat = document.getElementById('chat-main');
    
    // Сдвигаем сайдбар влево, выкатываем окно чата
    sidebar.classList.remove('translate-x-0');
    sidebar.classList.add('-translate-x-full', 'md:translate-x-0');
    
    mainChat.classList.remove('translate-x-full');
    mainChat.classList.add('translate-x-0');
}

function hideChatWindow() {
    const sidebar = document.getElementById('chat-sidebar');
    const mainChat = document.getElementById('chat-main');
    
    // Возвращаем сайдбар, прячем окно чата
    sidebar.classList.remove('-translate-x-full', 'md:translate-x-0');
    sidebar.classList.add('translate-x-0');
    
    mainChat.classList.remove('translate-x-0');
    mainChat.classList.add('translate-x-full');
}

// Пример перехвата: если в твоем index.js при клике на элемент списка меняется контент,
// добавь туда вызов showChatWindow().
</script>

</body>
</html>
